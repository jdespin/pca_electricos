<!-- Barra de búsqueda global (solo en vistas de tabla) -->
@if (mostrarTabs) {
  <div class="px-4 pt-3">
    <div class="relative">
      <!-- ícono lupa -->
      <svg class="pointer-events-none absolute left-3.5 top-1/2 h-4 w-4 -translate-y-1/2 text-slate-400"
        fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-4.35-4.35M17 11A6 6 0 115 11a6 6 0 0112 0z"/>
      </svg>
      <!-- input -->
      <input
        type="text"
        [(ngModel)]="inputBusqueda"
        (ngModelChange)="onBusqueda($event)"
        placeholder="Buscar por contrato, proyecto o locación..."
        class="w-full rounded-xl border border-slate-200 bg-white py-2.5 pl-10 pr-10 text-sm text-slate-700 shadow-sm placeholder:text-slate-400 focus:border-[#093E80] focus:outline-none focus:ring-2 focus:ring-[#093E80]/20 transition"
      />
      <!-- botón limpiar -->
      @if (inputBusqueda) {
        <button
          (click)="limpiarBusqueda()"
          class="absolute right-3 top-1/2 -translate-y-1/2 rounded-full p-0.5 text-slate-400 hover:bg-slate-100 hover:text-slate-600 transition">
          <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
      }
    </div>
    <!-- resultado de búsqueda activa -->
    @if (busquedaSrv.termino()) {
      <p class="mt-1.5 pl-1 text-xs text-slate-500">
        Resultados para
        <span class="font-semibold text-[#093E80]">"{{ busquedaSrv.termino() }}"</span>
      </p>
    }
  </div>
}

<!-- Tabs de navegación entre tipos de órdenes -->
@if (mostrarTabs) {
  <div class="px-4 pt-3 pb-0">
    <div class="flex gap-1 rounded-xl bg-slate-100 p-1">
      @for (tab of tabs; track tab.ruta) {
        <a
          [routerLink]="tab.ruta"
          [routerLinkActive]="''"
          #rla="routerLinkActive"
          class="relative flex flex-1 items-center justify-center gap-2 rounded-lg px-3 py-2.5 text-sm font-semibold transition-all duration-200"
          [class]="rla.isActive
            ? 'bg-white text-[#093E80] shadow-sm ring-1 ring-slate-200'
            : 'text-slate-500 hover:text-slate-700 hover:bg-white/60'">
          <!-- ícono -->
          <svg class="h-4 w-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" [attr.d]="tab.icon"/>
          </svg>
          <!-- etiqueta -->
          <span class="hidden sm:inline">{{ tab.label }}</span>
          <!-- punto activo -->
          @if (rla.isActive) {
            <span class="absolute -top-0.5 left-1/2 h-1 w-6 -translate-x-1/2 rounded-full"
              [style.backgroundColor]="tab.color"></span>
          }
        </a>
      }
    </div>
  </div>
}
