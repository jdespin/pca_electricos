<div class="p-4 sm:p-6">

  
  <div class="mb-8 flex items-center justify-between">
    <div>
      <h2 class="text-2xl font-bold text-gray-900">Nueva orden de trabajo</h2>
      <p class="text-sm text-gray-500 mt-1">Selecciona el tipo de orden que deseas registrar.</p>
    </div>
    <button
      type="button"
      (click)="volver()"
      class="inline-flex items-center gap-2 rounded-lg border border-gray-300 bg-white px-4 py-2 text-sm font-medium text-gray-700 hover:bg-gray-50 transition">
      <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
      </svg>
      Volver
    </button>
  </div>

  
  <div class="grid grid-cols-1 gap-6 sm:grid-cols-3 max-w-4xl mx-auto">

    
    <button
      type="button"
      (click)="seleccionar('inspeccion')"
      class="group flex flex-col items-center gap-5 rounded-2xl border-2 border-blue-200 bg-white p-8 shadow-sm transition hover:border-blue-500 hover:shadow-lg cursor-pointer text-left">
      <div class="flex h-16 w-16 items-center justify-center rounded-2xl bg-blue-100 group-hover:bg-blue-200 transition">
        <svg class="h-8 w-8 text-blue-600" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m5.231 13.481L15 17.25m-4.5-15H5.625c-.621 0-1.125.504-1.125 1.125v16.5c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9zm3.75 11.625a2.625 2.625 0 11-5.25 0 2.625 2.625 0 015.25 0z" />
        </svg>
      </div>
      <div class="text-center">
        <h3 class="text-lg font-bold text-gray-900 group-hover:text-blue-700 transition">Inspección</h3>
        <p class="text-sm text-gray-500 mt-2">
          Revisión técnica y diagnóstico del estado actual de los equipos eléctricos.
        </p>
      </div>
      <span class="mt-auto inline-flex items-center gap-1 rounded-full bg-blue-50 px-3 py-1 text-xs font-semibold text-blue-700 group-hover:bg-blue-100 transition">
        Seleccionar
        <svg class="h-3 w-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
        </svg>
      </span>
    </button>

    
    <button
      type="button"
      (click)="seleccionar('mantenimiento')"
      class="group flex flex-col items-center gap-5 rounded-2xl border-2 border-orange-200 bg-white p-8 shadow-sm transition hover:border-orange-500 hover:shadow-lg cursor-pointer text-left">
      <div class="flex h-16 w-16 items-center justify-center rounded-2xl bg-orange-100 group-hover:bg-orange-200 transition">
        <svg class="h-8 w-8 text-orange-600" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M11.42 15.17L17.25 21A2.652 2.652 0 0021 17.25l-5.877-5.877M11.42 15.17l2.496-3.03c.317-.384.74-.626 1.208-.766M11.42 15.17l-4.655 5.653a2.548 2.548 0 11-3.586-3.586l5.653-4.655m5.8-4.8a2.25 2.25 0 00-1.58 2.572 2.25 2.25 0 01-2.572 1.58 2.25 2.25 0 00-2.572 1.58 2.25 2.25 0 01-1.58 2.572M13.5 6.75a2.25 2.25 0 11-4.5 0 2.25 2.25 0 014.5 0z" />
        </svg>
      </div>
      <div class="text-center">
        <h3 class="text-lg font-bold text-gray-900 group-hover:text-orange-700 transition">Mantenimiento</h3>
        <p class="text-sm text-gray-500 mt-2">
          Actividades de mantenimiento preventivo o correctivo de equipos eléctricos.
        </p>
      </div>
      <span class="mt-auto inline-flex items-center gap-1 rounded-full bg-orange-50 px-3 py-1 text-xs font-semibold text-orange-700 group-hover:bg-orange-100 transition">
        Seleccionar
        <svg class="h-3 w-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
        </svg>
      </span>
    </button>

    
    <button
      type="button"
      (click)="seleccionar('instalacion')"
      class="group flex flex-col items-center gap-5 rounded-2xl border-2 border-green-200 bg-white p-8 shadow-sm transition hover:border-green-500 hover:shadow-lg cursor-pointer text-left">
      <div class="flex h-16 w-16 items-center justify-center rounded-2xl bg-green-100 group-hover:bg-green-200 transition">
        <svg class="h-8 w-8 text-green-600" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M8.25 3v1.5M4.5 8.25H3m18 0h-1.5M4.5 12H3m18 0h-1.5m-15 3.75H3m18 0h-1.5M8.25 19.5V21M12 3v1.5m0 15V21m3.75-18v1.5m0 15V21m-9-1.5h10.5a2.25 2.25 0 002.25-2.25V6.75a2.25 2.25 0 00-2.25-2.25H6.75A2.25 2.25 0 004.5 6.75v10.5a2.25 2.25 0 002.25 2.25zm.75-12h9v9h-9v-9z" />
        </svg>
      </div>
      <div class="text-center">
        <h3 class="text-lg font-bold text-gray-900 group-hover:text-green-700 transition">Instalación</h3>
        <p class="text-sm text-gray-500 mt-2">
          Montaje y puesta en marcha de nuevos equipos eléctricos en campo.
        </p>
      </div>
      <span class="mt-auto inline-flex items-center gap-1 rounded-full bg-green-50 px-3 py-1 text-xs font-semibold text-green-700 group-hover:bg-green-100 transition">
        Seleccionar
        <svg class="h-3 w-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
        </svg>
      </span>
    </button>

  </div>
</div>
