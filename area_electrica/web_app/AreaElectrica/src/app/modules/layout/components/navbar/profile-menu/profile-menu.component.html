<div class="relative ml-3">
  
  <button (click)="toggleMenu()" type="button"
    class="bg-card relative flex rounded-full text-sm focus:outline-none">
    <span class="sr-only">Open user menu</span>
    <div clickOutside (clickOutside)="isOpen = false"
      class="flex h-9 w-9 items-center justify-center rounded-full bg-[#093E80] text-white text-sm font-bold ring-2 ring-white/20 select-none">
      {{ iniciales || '?' }}
    </div>
  </button>

  
  <div
    [@openClose]="isOpen ? 'open' : 'closed'"
    class="bg-background shadow-custom border-muted absolute z-20 mt-2 w-60 origin-top-right transform rounded-md border border-dashed py-4 ring-1 ring-transparent ring-opacity-5 transition focus:outline-hidden ltr:right-0 rtl:left-0">

    
    <div class="flex items-center gap-3 px-4 pb-4">
      <div class="flex h-10 w-10 shrink-0 items-center justify-center rounded-full bg-[#093E80] text-white text-sm font-bold select-none">
        {{ iniciales || '?' }}
      </div>
      <div class="min-w-0">
        <p class="text-foreground truncate text-sm font-semibold">{{ nombreCompleto || 'Usuario' }}</p>
        <p class="text-muted-foreground truncate text-xs">{{ correo || '—' }}</p>
      </div>
    </div>

    <div class="border-border border-b border-dashed"></div>

    <ul class="my-2 mx-2 flex flex-col">
      @for (item of profileMenu; track $index) {
        <li
          routerLink="{{ item.link }}"
          class="text-muted-foreground hover:bg-card hover:text-primary inline-flex cursor-pointer items-center gap-2 rounded-md px-2 py-2 text-xs font-semibold">
          <svg-icon src="{{ item.icon }}" [svgClass]="'h-5 w-5 text-muted-foreground/50'"></svg-icon>
          {{ item.title }}
        </li>
      }

      <div class="border-border my-1 border-t border-dashed"></div>

      <li
        (click)="logout()"
        class="inline-flex cursor-pointer items-center gap-2 rounded-md px-2 py-2 text-xs font-semibold text-red-500 hover:bg-red-50 hover:text-red-600">
        <svg-icon src="./assets/icons/heroicons/outline/logout.svg" [svgClass]="'h-5 w-5 opacity-70'"></svg-icon>
        Cerrar sesión
      </li>
    </ul>
  </div>
</div>
